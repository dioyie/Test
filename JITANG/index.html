  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jit 的个人主页与持续探索索引。">
  <title>JIT — PERSONAL INDEX</title>
  <style>
    :root {
      --blue: #6e4366;
      --purple-deep: #432743;
      --paper: #f5f5f0;
      --faint: rgba(245, 245, 240, 0.55);
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --display: Didot, "Bodoni 72", "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--paper);
      background:
        radial-gradient(circle at 86% 10%, rgba(174, 127, 160, 0.72), transparent 34%),
        linear-gradient(135deg, #865f7c 0%, #6e4366 44%, var(--purple-deep) 100%);
      background-attachment: fixed;
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: min(1600px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      overflow: hidden;
    }

    .topbar {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 clamp(22px, 5vw, 76px);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .topbar-profile {
      width: 96px;
      justify-self: end;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      color: var(--paper);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: none;
    }

    .topbar-avatar {
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      display: block;
      border: 1px solid var(--paper);
      border-radius: 50%;
      padding: 2px;
      background: var(--paper);
      object-fit: cover;
      object-position: 50% 32%;
      filter: grayscale(1) contrast(1.12);
    }

    .hero {
      position: relative;
      min-height: 610px;
      padding: 6px clamp(22px, 5vw, 76px) 68px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .eyebrow {
      font-size: clamp(11px, 1.1vw, 15px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 28px 0 0;
      font-family: var(--display);
      font-size: clamp(88px, 15.3vw, 224px);
      font-weight: 400;
      letter-spacing: 0.018em;
      line-height: 0.76;
      text-transform: uppercase;
    }

    h1 span { display: block; }

    .hero-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-top: 44px;
      font-size: 10px;
      letter-spacing: 0.18em;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .hero-meta span:last-child { color: var(--faint); text-align: right; }

    .focus {
      padding: 4px clamp(22px, 5vw, 76px) 90px;
    }

    .section-label {
      margin: 0 0 14px;
      font-size: clamp(11px, 1.1vw, 15px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .focus-card {
      min-height: 88px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 18px 24px;
      color: var(--blue);
      background: var(--paper);
      border: 1px solid var(--paper);
      transition: color 180ms ease, background 180ms ease;
    }

    .focus-card:hover { color: var(--paper); background: transparent; }
    .focus-card + .focus-card { margin-top: 12px; }

 .focus-card .focus-title a {
            color: inherit;
            text-decoration: none;
        }

    .focus-number {
      font-size: 11px;
      letter-spacing: 0.16em;
    }

    .focus-title {
      font-family: var(--display);
      font-size: clamp(31px, 4vw, 56px);
      line-height: 0.9;
    }

    .focus-arrow { font-size: 27px; }

    footer {
      min-height: 70px;
      padding: 0 clamp(22px, 5vw, 76px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-top: 1px solid var(--paper);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      .topbar { min-height: 70px; }
      .hero { min-height: 540px; padding-top: 20px; }
      h1 { font-size: clamp(76px, 24vw, 132px); line-height: 0.8; }
      .hero-meta { align-items: flex-start; flex-direction: column; }
      .hero-meta span:last-child { text-align: left; }
      .focus { padding-bottom: 60px; }
      .focus-card { grid-template-columns: auto 1fr auto; padding-inline: 16px; }
      footer { min-height: 82px; align-items: flex-start; justify-content: center; flex-direction: column; gap: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>

    <header class="topbar">

    <section class="hero">
      <div>
        <div class="eyebrow">Personal index · Open horizon</div>

    <section class="focus" aria-labelledby="focus-title">

    </section>

    <footer>
      <span>JIT PERSONAL INDEX © 2026</span>
      <span>BUILT WITH CODEX / SICHUAN</span>
    </footer>
  </main>
