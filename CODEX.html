<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Codex — AI 编程助手，智能代码生成与理解。" />
    <title>CODEX — AI 编程助手</title>
    <style>
        :root {
            --blue: #6e4366;
            --purple-deep: #432743;
            --paper: #f5f5f0;
            --faint: rgba(245, 245, 240, 0.55);
            --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            --display: Didot, "Bodoni 72", "Times New Roman", serif;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            color: var(--paper);
            background:
                radial-gradient(circle at 86% 10%, rgba(174, 127, 160, 0.72), transparent 34%),
                linear-gradient(135deg, #865f7c 0%, #6e4366 44%, var(--purple-deep) 100%);
            background-attachment: fixed;
            font-family: var(--mono);
            -webkit-font-smoothing: antialiased;
        }

        .shell {
            width: min(1600px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }

        .topbar {
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(22px, 5vw, 76px);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .topbar-profile {
            width: 96px;
            justify-self: end;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: var(--paper);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: none;
        }

.topbar-back {
    color: var(--paper);
    text-decoration: none;
    font-weight: 400;
    transition: opacity 180ms ease;
    display: flex;
    align-items: center;
    gap: 6px;
}
.topbar-back:hover {
    opacity: 0.7;
}
.topbar-back .arrow {
    font-size: 18px;
    line-height: 1;
}

.topbar {
    flex-wrap: wrap;   /* 窄屏时允许换行 */
    gap: 8px;
}

        .topbar-avatar {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--paper);
            border-radius: 50%;
            padding: 2px;
            background: var(--paper);
            color: var(--blue);
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            transition: background 180ms ease, color 180ms ease;
        }

        .topbar-avatar:hover {
            background: transparent;
            color: var(--paper);
        }

        .hero {
            position: relative;
            min-height: 610px;
            padding: 6px clamp(22px, 5vw, 76px) 68px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .eyebrow {
            font-size: clamp(11px, 1.1vw, 15px);
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        h1 {
            position: relative;
            z-index: 1;
            margin: 28px 0 0;
            font-family: var(--display);
            font-size: clamp(88px, 15.3vw, 224px);
            font-weight: 400;
            letter-spacing: 0.018em;
            line-height: 0.76;
            text-transform: uppercase;
        }

        h1 span {
            display: block;
        }

        .hero-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            margin-top: 44px;
            font-size: 10px;
            letter-spacing: 0.18em;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .hero-meta span:last-child {
            color: var(--faint);
            text-align: right;
        }

        .focus {
            padding: 4px clamp(22px, 5vw, 76px) 90px;
        }

        .section-label {
            margin: 0 0 14px;
            font-size: clamp(11px, 1.1vw, 15px);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .focus-card {
            min-height: 88px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 24px;
            padding: 18px 24px;
            color: var(--blue);
            background: var(--paper);
            border: 1px solid var(--paper);
            transition: color 180ms ease, background 180ms ease;
        }

        .focus-card:hover {
            color: var(--paper);
            background: transparent;
        }

        .focus-card+.focus-card {
            margin-top: 12px;
        }

        .focus-number {
            font-size: 11px;
            letter-spacing: 0.16em;
        }

        .focus-title {
            font-family: var(--display);
            font-size: clamp(31px, 4vw, 56px);
            line-height: 0.9;
        }

        .focus-desc {
            font-size: 13px;
            letter-spacing: 0.04em;
            opacity: 0.7;
            grid-column: 2;
            margin-top: 2px;
        }

        .focus-card .focus-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .focus-arrow {
            font-size: 27px;
        }

        footer {
            min-height: 70px;
            padding: 0 clamp(22px, 5vw, 76px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            border-top: 1px solid var(--paper);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        @media (max-width: 700px) {
            .topbar {
                min-height: 70px;
            }
            .hero {
                min-height: 540px;
                padding-top: 20px;
            }
            h1 {
                font-size: clamp(76px, 24vw, 132px);
                line-height: 0.8;
            }
            .hero-meta {
                align-items: flex-start;
                flex-direction: column;
            }
            .hero-meta span:last-child {
                text-align: left;
            }
            .focus {
                padding-bottom: 60px;
            }
            .focus-card {
                grid-template-columns: auto 1fr auto;
                padding-inline: 16px;
            }
            .focus-desc {
                font-size: 11px;
            }
            footer {
                min-height: 82px;
                align-items: flex-start;
                justify-content: center;
                flex-direction: column;
                gap: 8px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <!-- 顶部栏 -->
       <header class="topbar">
           <!-- 左侧返回链接 -->
           <a class="topbar-back" href="index.html" title="返回个人索引">
               <span class="arrow">←</span>
               <span>返回</span>
           </a>
           <!-- 右侧品牌信息 -->
           <div class="topbar-profile">
               <span>Codex</span>
               <div class="topbar-avatar" aria-label="Codex 标识">&lt;/&gt;</div>
           </div>
       </header>

        <!-- Hero 区域 -->
        <section class="hero">
            <div>
                <div class="eyebrow">AI 编程助手 · 代码生成</div>
                <h1>
                    CODEX
                    <span>AI 编程助手</span>
                </h1>
            </div>
            <div class="hero-meta">
                <span>智能生成 · 多语言支持</span>
                <span>基于大语言模型<br />持续进化 · 2026</span>
            </div>
        </section>

        <!-- Focus 卡片区域 -->
        <section class="focus" aria-labelledby="focus-title">
            <h2 class="section-label" id="focus-title">核心能力 / Core capabilities</h2>

            <article class="focus-card">
                <div class="focus-number">01</div>
                <div class="focus-title-wrap">
                    <div class="focus-title">代码生成</div>
                    <div class="focus-desc">将自然语言描述转换为可执行的代码片段</div>
                </div>
                <div class="focus-arrow">✓</div>
            </article>

            <article class="focus-card">
                <div class="focus-number">02</div>
                <div class="focus-title-wrap">
                    <div class="focus-title">多语言理解</div>
                    <div class="focus-desc">支持 Python、JavaScript、Go、Rust 等数十种语言</div>
                </div>
                <div class="focus-arrow">✓</div>
            </article>

            <article class="focus-card">
                <div class="focus-number">03</div>
                <div class="focus-title-wrap">
                    <div class="focus-title">智能上下文</div>
                    <div class="focus-desc">理解代码上下文与意图，提供精准补全与建议</div>
                </div>
                <div class="focus-arrow">✓</div>
            </article>
        </section>

        <!-- 底部 -->
        <footer>
            <span>CODEX · AI 编程助手 © 2026</span>
            <span>BUILT WITH CODEX / ##</span>
        </footer>
    </main>
</body>
</html>
